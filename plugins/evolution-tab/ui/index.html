<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Evolution</title>
  <link rel="stylesheet" href="/_plugin-runtime/theme.css">
  <style>
    :root {
      --bg: hsl(var(--background));
      --panel: hsl(var(--card));
      --panel-2: hsl(var(--muted));
      --line: hsl(var(--border));
      --muted-text: hsl(var(--muted-foreground));
      --main-text: hsl(var(--foreground));
      --soft-text: hsl(var(--foreground) / 0.78);
      --edge: hsl(var(--muted-foreground) / 0.48);
      --shadow: hsl(var(--foreground) / 0.08);
      --node-bg: linear-gradient(180deg, hsl(var(--card)), hsl(var(--muted) / 0.42));
      --host-font-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: var(--bg); color: var(--main-text); }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; letter-spacing: 0; }
    button, textarea { font: inherit; }

    .shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      grid-template-rows: 58px minmax(0, 1fr);
      width: 100vw;
      height: 100vh;
    }

    .topbar {
      grid-column: 1 / 3;
      display: grid;
      grid-template-columns: minmax(180px, 1fr) minmax(260px, 420px) minmax(180px, 1fr);
      align-items: center;
      gap: 16px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--line);
      background: hsl(var(--background) / 0.94);
    }

    .title { min-width: 0; }
    .title strong { display: block; font-size: 14px; line-height: 18px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .title span { display: block; color: var(--muted-text); font-size: 11px; line-height: 16px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .replay {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-self: center;
      width: min(420px, 100%);
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius, 8px);
      background: var(--panel);
      box-shadow: 0 10px 24px var(--shadow);
    }

    .icon-button {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius, 6px);
      background: var(--panel-2);
      color: var(--main-text);
      cursor: pointer;
    }
    .icon-button:hover { border-color: hsl(var(--ring)); }

    input[type="range"] {
      width: 100%;
      accent-color: hsl(var(--primary));
    }

    .count {
      min-width: 50px;
      text-align: right;
      color: var(--muted-text);
      font-family: var(--host-font-mono);
      font-variant-numeric: tabular-nums;
      font-size: 11px;
    }

    .toolbar {
      justify-self: end;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter {
      width: 168px;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius, 6px);
      background: hsl(var(--background));
      color: var(--main-text);
      padding: 7px 9px;
      outline: none;
    }
    .filter:focus { border-color: hsl(var(--ring)); }

    .button {
      border: 1px solid var(--line);
      border-radius: var(--radius, 6px);
      background: var(--panel);
      color: var(--main-text);
      padding: 7px 10px;
      cursor: pointer;
      white-space: nowrap;
    }
    .button:hover { border-color: hsl(var(--ring)); }
    .button.primary { border-color: hsl(var(--primary) / 0.55); color: hsl(var(--foreground)); }
    .button.danger { border-color: hsl(var(--destructive) / 0.55); color: hsl(var(--destructive)); }

    .canvas {
      position: relative;
      overflow: auto;
      cursor: grab;
      background:
        linear-gradient(hsl(var(--foreground) / 0.035) 1px, transparent 1px),
        linear-gradient(90deg, hsl(var(--foreground) / 0.035) 1px, transparent 1px),
        var(--bg);
      background-size: 28px 28px;
    }
    .canvas.dragging {
      cursor: grabbing;
      user-select: none;
    }

    .graph {
      position: relative;
      min-width: 1080px;
      min-height: 720px;
      padding: 42px 56px 96px;
    }

    svg.edges {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: visible;
    }

    .edge {
      fill: none;
      stroke: var(--edge);
      stroke-width: 1.3;
      opacity: 0.72;
    }

    .edge-label {
      fill: var(--muted-text);
      font-size: 10px;
      text-anchor: middle;
      dominant-baseline: middle;
      paint-order: stroke;
      stroke: var(--bg);
      stroke-width: 4px;
    }

    .node {
      position: absolute;
      width: 220px;
      min-height: 94px;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius, 8px);
      background: var(--node-bg);
      box-shadow: 0 16px 34px var(--shadow);
      cursor: pointer;
      user-select: none;
    }

    .node:hover { border-color: hsl(var(--ring)); }
    .node.selected { outline: 2px solid hsl(var(--primary) / 0.65); outline-offset: 2px; }
    .node.compare { outline: 2px solid hsl(42 82% 56% / 0.72); outline-offset: 2px; }
    .node.dim { opacity: 0.24; }
    .node.search-dim { opacity: 0.18; }
    .node.selected-path { box-shadow: 0 0 0 1px hsl(var(--primary) / 0.35), 0 16px 34px var(--shadow); }
    .node.state-blocked { border-style: dashed; border-color: hsl(var(--destructive) / 0.65); }
    .node.state-pruned { opacity: 0.58; border-style: dashed; }
    .node.state-merged { border-color: hsl(187 70% 45% / 0.72); }

    .node.hypothesis { border-color: hsl(142 55% 45% / 0.52); }
    .node.experiment { border-color: hsl(231 88% 70% / 0.48); }
    .node.steer { border-color: hsl(187 70% 45% / 0.48); }
    .node.escalation { border-color: hsl(42 82% 56% / 0.52); }
    .node.terminal { border-color: hsl(var(--muted-foreground) / 0.42); }
    .node.root { border-color: hsl(var(--foreground) / 0.38); }
    .node.mission { border-color: hsl(187 70% 45% / 0.48); }

    .meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      color: var(--muted-text);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .status {
      max-width: 86px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 2px 6px;
      border-radius: 999px;
      background: hsl(var(--muted) / 0.72);
      color: var(--soft-text);
      text-transform: none;
      letter-spacing: 0;
    }
    .status.good { color: hsl(142 55% 40%); background: hsl(142 55% 45% / 0.13); }
    .status.warn { color: hsl(42 82% 42%); background: hsl(42 82% 56% / 0.14); }
    .status.bad { color: hsl(var(--destructive)); background: hsl(var(--destructive) / 0.14); }
    .status.selected { color: hsl(var(--primary)); background: hsl(var(--primary) / 0.13); }

    .node-title {
      font-weight: 650;
      line-height: 17px;
      margin-bottom: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .node-body {
      color: var(--soft-text);
      font-size: 11px;
      line-height: 15px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .chips {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-top: 9px;
    }

    .chip {
      max-width: 92px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 3px 6px;
      border: 1px solid hsl(var(--border) / 0.8);
      border-radius: 999px;
      color: var(--muted-text);
      font-size: 10px;
      background: hsl(var(--muted) / 0.58);
    }

    .inspector {
      border-left: 1px solid var(--line);
      background: var(--panel);
      min-width: 0;
      overflow: auto;
      padding: 18px;
    }

    .section { margin-bottom: 18px; }
    .section h2 {
      margin: 0 0 8px;
      font-size: 12px;
      font-weight: 700;
      color: var(--main-text);
    }
    .kv {
      display: grid;
      grid-template-columns: 80px minmax(0, 1fr);
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid hsl(var(--border) / 0.72);
      font-family: var(--host-font-mono);
      font-size: 12px;
    }
    .kv span:first-child { color: var(--muted-text); }
    .kv span:last-child { overflow-wrap: anywhere; }

    .source-list {
      display: grid;
      gap: 7px;
    }
    .source-button {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: var(--radius, 6px);
      background: hsl(var(--background));
      color: var(--main-text);
      padding: 8px 9px;
      cursor: pointer;
    }
    .source-button:hover { border-color: hsl(var(--ring)); }
    .source-button span {
      display: block;
      color: var(--muted-text);
      font-size: 10px;
      margin-top: 2px;
    }
    .source-preview {
      margin: 10px 0 0;
      max-height: 220px;
      overflow: auto;
      white-space: pre-wrap;
      border: 1px solid var(--line);
      border-radius: var(--radius, 6px);
      background: hsl(var(--background));
      color: var(--soft-text);
      padding: 9px;
      font-family: var(--host-font-mono);
      font-size: 11px;
      line-height: 1.45;
    }

    textarea {
      width: 100%;
      min-height: 82px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: var(--radius, 7px);
      background: hsl(var(--background));
      color: var(--main-text);
      padding: 9px;
      outline: none;
    }
    textarea:focus { border-color: hsl(var(--ring)); }

    .actions { display: grid; grid-template-columns: 1fr; gap: 8px; }

    .empty {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: var(--muted-text);
      text-align: center;
      padding: 32px;
    }
    .empty strong { display: block; color: var(--main-text); margin-bottom: 6px; }

    .context {
      position: fixed;
      min-width: 210px;
      z-index: 30;
      border: 1px solid var(--line);
      border-radius: var(--radius, 8px);
      background: hsl(var(--popover));
      color: hsl(var(--popover-foreground));
      box-shadow: 0 18px 50px hsl(var(--foreground) / 0.18);
      padding: 6px;
    }
    .context button {
      width: 100%;
      text-align: left;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: hsl(var(--popover-foreground));
      padding: 8px 9px;
      cursor: pointer;
    }
    .context button:hover { background: hsl(var(--muted) / 0.7); }

    @media (max-width: 900px) {
      .shell { grid-template-columns: 1fr; grid-template-rows: 58px minmax(0, 1fr) 260px; }
      .topbar { grid-column: 1; grid-template-columns: 1fr; height: auto; align-items: stretch; }
      .toolbar { display: none; }
      .inspector { border-left: 0; border-top: 1px solid var(--line); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="title">
        <strong id="runTitle">Evolution</strong>
        <span id="runSub">Waiting for session...</span>
      </div>
      <div class="replay">
        <button class="icon-button" id="playBtn" title="Play replay" aria-label="Play replay">&gt;</button>
        <input id="scrubber" type="range" min="0" max="0" value="0" />
        <div class="count" id="stepCount">0/0</div>
      </div>
      <div class="toolbar">
        <input class="filter" id="filter" type="search" placeholder="Filter graph" />
        <button class="button" id="fitBtn">Center</button>
        <button class="button" id="refreshBtn">Refresh</button>
      </div>
    </header>

    <main class="canvas" id="canvas">
      <div class="graph" id="graph">
        <svg class="edges" id="edges"></svg>
        <div class="empty" id="empty"><div><strong>No evolution graph yet</strong><span>Waiting for evolution.json...</span></div></div>
      </div>
    </main>

    <aside class="inspector">
      <div class="section">
        <h2>Selection</h2>
        <div id="details">
          <div class="kv"><span>Status</span><span>No node selected</span></div>
        </div>
      </div>
      <div class="section">
        <h2>Sources</h2>
        <div class="source-list" id="sources"></div>
        <pre class="source-preview" id="sourcePreview" hidden></pre>
      </div>
      <div class="section">
        <h2>Steer Note</h2>
        <textarea id="note" placeholder="Optional instruction sent with the selected graph operation"></textarea>
      </div>
      <div class="section">
        <h2>Operations</h2>
        <div class="actions" id="actions"></div>
      </div>
    </aside>
  </div>

  <script>
    const os = window.acquireOSApi();
    const state = {
      session: null,
      evolution: null,
      children: null,
      graph: { nodes: [], edges: [] },
      selectedId: null,
      replayIndex: 0,
      compareIds: new Set(),
      playTimer: null,
      contextNode: null,
      drag: null,
      query: "",
      sourcePreview: null,
    };

    const el = {
      canvas: document.getElementById("canvas"),
      graph: document.getElementById("graph"),
      edges: document.getElementById("edges"),
      empty: document.getElementById("empty"),
      runTitle: document.getElementById("runTitle"),
      runSub: document.getElementById("runSub"),
      scrubber: document.getElementById("scrubber"),
      stepCount: document.getElementById("stepCount"),
      playBtn: document.getElementById("playBtn"),
      filter: document.getElementById("filter"),
      fitBtn: document.getElementById("fitBtn"),
      refreshBtn: document.getElementById("refreshBtn"),
      details: document.getElementById("details"),
      sources: document.getElementById("sources"),
      sourcePreview: document.getElementById("sourcePreview"),
      actions: document.getElementById("actions"),
      note: document.getElementById("note"),
    };

    const typeLabel = {
      root: "Run",
      mission: "Mission",
      hypothesis: "Hypothesis",
      experiment: "Evidence",
      escalation: "Escalation",
      steer: "Decision",
      terminal: "Path",
    };

    function slug(value) {
      return String(value || "path")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "")
        .slice(0, 56) || "path";
    }

    function text(value, fallback = "") {
      if (value == null) return fallback;
      if (typeof value === "string") return value;
      if (typeof value === "number" || typeof value === "boolean") return String(value);
      return fallback;
    }

    function summaryOf(value) {
      if (!value || typeof value !== "object") return "";
      return text(
        value.summary || value.description || value.rationale || value.target || value.prompt || value.goal,
        "",
      );
    }

    function statusClass(status) {
      const s = String(status || "").toLowerCase();
      if (["selected", "winner", "winning"].some((x) => s.includes(x))) return "selected";
      if (["complete", "completed", "merged", "success", "positive", "done"].some((x) => s.includes(x))) return "good";
      if (["regress", "failed", "stop", "prune", "error", "negative"].some((x) => s.includes(x))) return "bad";
      if (["plateau", "warn", "pending", "defer", "running", "active"].some((x) => s.includes(x))) return "warn";
      return "";
    }

    function asArray(value) {
      if (Array.isArray(value)) return value;
      if (value == null || value === "") return [];
      return [value];
    }

    function firstText(...values) {
      for (const value of values) {
        const next = text(value, "");
        if (next) return next;
      }
      return "";
    }

    function compactDate(value) {
      const raw = text(value, "");
      if (!raw) return "";
      const d = new Date(raw);
      if (Number.isNaN(d.getTime())) return raw;
      return d.toLocaleString(undefined, {
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit",
      });
    }

    function collectTimestamps(raw) {
      if (!raw || typeof raw !== "object") return [];
      const fields = [
        ["created", raw.created_at || raw.createdAt || raw.created],
        ["started", raw.started_at || raw.startedAt || raw.started],
        ["updated", raw.updated_at || raw.updatedAt || raw.updated || raw.last_updated],
        ["completed", raw.completed_at || raw.completedAt || raw.completed || raw.finished_at || raw.finishedAt],
      ];
      return fields.flatMap(([label, value]) => {
        const formatted = compactDate(value);
        return formatted ? [{ label, value: formatted, raw: text(value, "") }] : [];
      });
    }

    function stateTagFor(raw, selected = false) {
      const status = `${raw?.state || ""} ${raw?.status || ""} ${raw?.verdict || ""} ${raw?.outcome || ""}`.toLowerCase();
      if (selected || raw?.selected || raw?.winning || raw?.winner) return "selected";
      if (raw?.blocked || status.includes("blocked") || status.includes("blocker")) return "blocked";
      if (raw?.pruned || raw?.stopped || status.includes("pruned") || status.includes("stopped") || status.includes("stop")) return "pruned";
      if (raw?.merged || status.includes("merged")) return "merged";
      return "";
    }

    function displayStatus(raw, fallback = "") {
      const tag = stateTagFor(raw);
      if (tag) return tag;
      return firstText(raw?.verdict, raw?.status, raw?.state, raw?.outcome, fallback);
    }

    function collectWorkerIds(raw, child) {
      const ids = [
        ...asArray(raw?.worker_session_ids || raw?.workerSessionIds || raw?.worker_sessions || raw?.workerSessions),
        raw?.worker_session_id,
        raw?.workerSessionId,
        raw?.session_id,
        raw?.sessionId,
        raw?.target_session_id,
        raw?.targetSessionId,
        raw?.worker?.session_id,
        raw?.worker?.sessionId,
        child?.id,
      ];
      return [...new Set(ids.map((id) => text(id, "").trim()).filter(Boolean))];
    }

    function artifactLabel(name) {
      const normalized = text(name, "");
      if (normalized === "report.md") return "Report";
      if (normalized === "findings.md") return "Findings";
      if (normalized === "claims.md") return "Claims";
      if (normalized === "progress.md") return "Progress";
      if (normalized === "plan.json") return "Plan";
      return normalized;
    }

    const readableArtifacts = new Set(["report.md", "findings.md", "claims.md", "progress.md", "plan.json"]);

    function sourceFrom(value, fallbackType = "source") {
      if (!value) return null;
      if (typeof value === "string") {
        const raw = value.trim();
        if (!raw) return null;
        if (/^https?:\/\//i.test(raw)) return { type: "link", label: raw, href: raw };
        if (/^(report|findings|claims|progress)\.md$|^plan\.json$/i.test(raw)) {
          return { type: "artifact", label: artifactLabel(raw), artifact: raw };
        }
        if (/^[0-9a-f]{7,40}$/i.test(raw)) return { type: "commit", label: raw.slice(0, 12), commit: raw };
        return { type: fallbackType, label: raw };
      }
      if (typeof value !== "object") return null;
      const artifact = text(value.artifact || value.file || value.path, "");
      const commit = text(value.commit || value.sha, "");
      const sessionId = text(value.sessionId || value.session_id || value.workerSessionId || value.worker_session_id, "");
      const href = text(value.href || value.url, "");
      const label = firstText(value.label, value.title, artifact && artifactLabel(artifact), commit && commit.slice(0, 12), sessionId, href, fallbackType);
      if (artifact && readableArtifacts.has(artifact)) return { type: text(value.type, "artifact"), label, artifact };
      if (artifact) return { type: text(value.type, "worker-output"), label, detail: artifact };
      if (commit) return { type: text(value.type, "commit"), label, commit };
      if (sessionId) return { type: text(value.type, "worker"), label, sessionId };
      if (href) return { type: text(value.type, "link"), label, href };
      return { type: text(value.type, fallbackType), label, detail: text(value.detail || value.description || value.summary, "") };
    }

    function collectSources(raw, metrics = []) {
      const sources = [
        ...asArray(raw?.sources),
        ...asArray(raw?.source_links || raw?.sourceLinks),
        ...asArray(raw?.evidence_sources || raw?.evidenceSources),
        ...asArray(raw?.evidence_links || raw?.evidenceLinks),
        ...asArray(raw?.commits || raw?.commit),
      ].map((item) => sourceFrom(item)).filter(Boolean);

      if (raw?.report || raw?.report_md) sources.push(sourceFrom("report.md"));
      if (raw?.findings || raw?.findings_md) sources.push(sourceFrom("findings.md"));

      for (const metric of metrics) {
        const data = metric?.data && typeof metric.data === "object" ? metric.data : {};
        const label = text(data.label || metric?.label || metric?.file, "");
        const value = text(data.value || metric?.value || "", "");
        const inferred = sourceFrom(label, "worker-output");
        if (inferred) {
          inferred.detail = value || inferred.detail || "";
          sources.push(inferred);
        }
      }

      const seen = new Set();
      return sources.filter((source) => {
        const key = `${source.type}:${source.artifact || source.commit || source.sessionId || source.href || source.label}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function childForPath(path) {
      const id = slug(path.id || path.slug || path.title || path.name);
      const hay = `${id} ${path.title || ""} ${path.name || ""}`.toLowerCase();
      const children = state.children?.children || [];
      return children.find((child) => {
        const c = `${child.id || ""} ${child.title || ""} ${child.target || ""} ${child.prompt || ""}`.toLowerCase();
        const childSlug = slug(child.title || child.target || child.id || "");
        return c.includes(id) || (childSlug !== "path" && hay.includes(childSlug));
      }) || null;
    }

    function coercePaths(source) {
      if (!source || typeof source !== "object") return [];
      const candidates = [
        source.paths,
        source.missions,
        source.mission_branches,
        source.branches,
        source.candidates,
        source.hypotheses,
      ];
      for (const item of candidates) {
        if (Array.isArray(item)) return item;
        if (item && typeof item === "object") {
          return Object.entries(item).map(([id, value]) => ({ id, ...(value || {}) }));
        }
      }
      return [];
    }

    function normalizeExplicit(source) {
      if (!Array.isArray(source?.nodes)) return null;
      const nodes = source.nodes.map((raw, index) => {
        const id = text(raw.id, `node-${index}`);
        const type = text(raw.type || raw.kind, "hypothesis").toLowerCase();
        const title = text(raw.title || raw.label || raw.name, id);
        return {
          id,
          type: type.includes("exp") ? "experiment" : type.includes("steer") ? "steer" : type.includes("esc") ? "escalation" : type.includes("stop") || type.includes("merge") ? "terminal" : type,
          title,
          body: text(raw.body || raw.description || raw.summary, ""),
          status: displayStatus(raw, text(raw.decision, "")),
          stateTag: stateTagFor(raw),
          pathId: text(raw.pathId || raw.path_id || raw.path, ""),
          targetSessionId: text(raw.targetSessionId || raw.sessionId || raw.session_id, ""),
          workerSessionIds: collectWorkerIds(raw, null),
          timestamps: collectTimestamps(raw),
          sources: collectSources(raw, asArray(raw.metrics)),
          chips: raw.chips || [],
          raw,
        };
      });
      const byId = new Map(nodes.map((node) => [node.id, node]));
      const lanes = new Map();
      nodes.forEach((node) => {
        const lane = node.pathId || node.id;
        if (!lanes.has(lane)) lanes.set(lane, lanes.size);
        const laneIndex = lanes.get(lane);
        const step = Array.isArray(source.edges)
          ? source.edges.filter((edge) => edge.to === node.id || edge.target === node.id).length
          : 0;
        node.x = 72 + Math.min(step, 4) * 260;
        node.y = 72 + laneIndex * 132;
      });
      const edges = (source.edges || []).flatMap((edge) => {
        const from = text(edge.from || edge.source, "");
        const to = text(edge.to || edge.target, "");
        if (!byId.has(from) || !byId.has(to)) return [];
        return [{ from, to, label: text(edge.label || edge.type, "causes") }];
      });
      return { nodes, edges };
    }

    function metricSummary(metric) {
      if (!metric || typeof metric !== "object") return "";
      const data = metric.data && typeof metric.data === "object" ? metric.data : {};
      const label = text(data.label || data.name || data.title || metric.metric_name || metric.name, "");
      const value = text(data.value || data.status || data.result || metric.value, "");
      return [label, value].filter(Boolean).join(": ");
    }

    function normalizeMissions(source) {
      if (!Array.isArray(source?.missions)) return null;
      const nodes = [];
      const edges = [];
      const rootId = "run-root";
      const missions = source.missions;
      const rowHeight = 156;
      const missionGap = 92;
      const totalCandidates = missions.reduce((sum, mission) => {
        return sum + (Array.isArray(mission?.candidates) ? mission.candidates.length : 0);
      }, 0);

      nodes.push({
        id: rootId,
        type: "root",
        title: text(source.title || source.runTitle || source.task || "Deep run", "Deep run"),
        body: text(source.summary || source.prompt || "Mission and candidate outcomes.", ""),
        status: text(source.status || "active"),
        stateTag: stateTagFor(source),
        x: 72,
        y: 96,
        pathId: "",
        workerSessionIds: [],
        timestamps: collectTimestamps(source),
        sources: [sourceFrom("report.md"), sourceFrom("findings.md")].filter(Boolean),
        chips: [`missions ${missions.length}`, `candidates ${totalCandidates}`],
        raw: source,
      });

      let yCursor = 54;
      missions.forEach((mission, missionIndex) => {
        const missionId = slug(mission.mission_name || mission.name || mission.title || `mission-${missionIndex + 1}`);
        const candidates = Array.isArray(mission.candidates) ? mission.candidates : [];
        const missionNodeId = `${missionId}:mission`;
        const selectedBranch = text(mission.selected_branch || mission.selectedBranch, "");
        const selectedCandidate = text(mission.selected_candidate || mission.selectedCandidate || mission.winning_candidate || mission.winningCandidate, "");
        const missionY = yCursor;
        const missionSources = collectSources(mission, []);

        nodes.push({
          id: missionNodeId,
          type: "mission",
          title: text(mission.mission_name || mission.name || mission.title || missionId, missionId),
          body: text(mission.description || mission.summary || mission.mission_base_branch || mission.base_branch || "Mission branch group.", ""),
          status: selectedBranch ? "selected" : text(mission.status || "active"),
          stateTag: stateTagFor(mission, Boolean(selectedBranch)),
          x: 320,
          y: missionY,
          pathId: missionId,
          targetSessionId: "",
          workerSessionIds: collectWorkerIds(mission, null),
          timestamps: collectTimestamps(mission),
          sources: missionSources.length ? missionSources : [sourceFrom("report.md"), sourceFrom("findings.md")].filter(Boolean),
          chips: [selectedBranch && "selected branch", candidates.length && `${candidates.length} candidates`].filter(Boolean),
          raw: mission,
        });
        edges.push({ from: rootId, to: missionNodeId, label: "contains" });

        candidates.forEach((candidate, candidateIndex) => {
          const candidateId = slug(candidate.candidate_name || candidate.name || candidate.title || `candidate-${candidateIndex + 1}`);
          const nodeId = `${missionId}:${candidateId}`;
          const metrics = Array.isArray(candidate.metrics) ? candidate.metrics : [];
          const child = childForPath({
            id: candidateId,
            title: candidate.candidate_name,
            target: candidate.hypothesis,
          });
          const isSelected = Boolean(
            selectedCandidate && selectedCandidate === text(candidate.candidate_name || candidate.name || candidate.title, "")
          ) || Boolean(
            selectedBranch && selectedBranch === text(candidate.candidate_branch || candidate.branch, "")
          );
          const stateTag = stateTagFor(candidate, isSelected);
          const status = displayStatus(candidate, child?.status || "");
          const workerSessionIds = collectWorkerIds(candidate, child);
          const timestamps = collectTimestamps(candidate);
          const sources = collectSources(candidate, metrics);
          const y = missionY + candidateIndex * rowHeight;

          nodes.push({
            id: nodeId,
            type: "hypothesis",
            title: text(candidate.candidate_name || candidate.name || candidate.title || candidateId, candidateId),
            body: text(candidate.hypothesis || candidate.description || candidate.summary || "Candidate path.", ""),
            status: isSelected ? "selected" : status,
            stateTag,
            x: 580,
            y,
            pathId: candidateId,
            targetSessionId: workerSessionIds[0] || "",
            workerSessionIds,
            timestamps,
            sources,
            chips: [
              candidate.active ? "active" : "",
              stateTag || status,
              workerSessionIds[0] ? `worker ${workerSessionIds[0].slice(0, 8)}` : "",
              timestamps[0] ? timestamps[0].value : "",
              text(candidate.candidate_branch || candidate.branch, "").split("/").slice(-1)[0],
            ].filter(Boolean),
            raw: candidate,
          });
          edges.push({ from: missionNodeId, to: nodeId, label: "candidate" });

          metrics.forEach((metric, metricIndex) => {
            const metricId = `${nodeId}:metric-${metricIndex + 1}`;
            nodes.push({
              id: metricId,
              type: "experiment",
              title: text(metric.metric_name || metric.name || `metric ${metricIndex + 1}`, `metric ${metricIndex + 1}`),
              body: metricSummary(metric) || text(metric.summary || metric.description || "Metric evidence.", ""),
              status,
              stateTag,
              x: 840 + metricIndex * 250,
              y,
              pathId: candidateId,
              targetSessionId: workerSessionIds[0] || "",
              workerSessionIds,
              timestamps: collectTimestamps(metric),
              sources: collectSources(metric, [metric]),
              chips: [text(metric.metric_type || metric.type, "")].filter(Boolean),
              raw: metric,
            });
            edges.push({
              from: metricIndex === 0 ? nodeId : `${nodeId}:metric-${metricIndex}`,
              to: metricId,
              label: metricIndex === 0 ? "evidence" : "then",
            });
          });
        });

        yCursor += Math.max(rowHeight, candidates.length * rowHeight) + missionGap;
      });

      return { nodes, edges };
    }

    function normalizeFallback(source) {
      const paths = coercePaths(source);
      const nodes = [];
      const edges = [];
      const rootId = "run-root";
      const title = text(source?.title || source?.runTitle || source?.task || "Deep run", "Deep run");
      nodes.push({
        id: rootId,
        type: "root",
        title,
        body: text(source?.summary || source?.prompt || "Orchestrator decisions and path outcomes.", ""),
        status: text(source?.status || "active"),
        stateTag: stateTagFor(source),
        x: 72,
        y: 86,
        pathId: "",
        workerSessionIds: [],
        timestamps: collectTimestamps(source),
        sources: [sourceFrom("report.md"), sourceFrom("findings.md")].filter(Boolean),
        chips: [`paths ${paths.length || 0}`],
        raw: source || {},
      });

      if (!paths.length) return { nodes, edges };

      paths.forEach((path, lane) => {
        const pathId = slug(path.id || path.slug || path.title || path.name || `path-${lane + 1}`);
        const child = childForPath(path);
        const y = 54 + lane * 142;
        const title = text(path.title || path.name || path.mission || pathId, pathId);
        const status = displayStatus(path, child?.status || "active");
        const stateTag = stateTagFor(path);
        const workerSessionIds = collectWorkerIds(path, child);
        const timestamps = collectTimestamps(path);
        const sources = collectSources(path, []);
        const confidence = text(path.prior_confidence || path.priorConfidence || path.confidence || path.posterior_confidence, "");
        const metric = text(path.metric || path.metric_value || path.score || path.delta || path.metricTarget, "");
        const hypId = `${pathId}:hypothesis`;
        const expId = `${pathId}:evidence`;
        const steerId = `${pathId}:decision`;
        const terminalId = `${pathId}:terminal`;
        nodes.push({
          id: hypId,
          type: "hypothesis",
          title,
          body: summaryOf(path) || "Path proposal and initial prior.",
          status,
          stateTag,
          x: 330,
          y,
          pathId,
          targetSessionId: workerSessionIds[0] || "",
          workerSessionIds,
          timestamps,
          sources,
          chips: [confidence && `prior ${confidence}`, metric && `target ${metric}`, stateTag].filter(Boolean),
          raw: path,
        });
        nodes.push({
          id: expId,
          type: "experiment",
          title: text(path.experiment || path.commit || path.exp || "evidence", "evidence"),
          body: text(path.evidence || path.result || path.finding || path.findings || "Evidence collected for this path.", ""),
          status,
          stateTag,
          x: 590,
          y,
          pathId,
          targetSessionId: workerSessionIds[0] || "",
          workerSessionIds,
          timestamps,
          sources,
          chips: [metric && `metric ${metric}`, text(path.delta || path.change, "") && `delta ${text(path.delta || path.change)}`].filter(Boolean),
          raw: path,
        });
        nodes.push({
          id: steerId,
          type: "steer",
          title: text(path.decision || path.action || "decision", "decision"),
          body: text(path.instruction || path.reason || path.rationale || "Orchestrator decision for this path.", ""),
          status,
          stateTag,
          x: 850,
          y,
          pathId,
          targetSessionId: workerSessionIds[0] || "",
          workerSessionIds,
          timestamps,
          sources,
          chips: [workerSessionIds[0] ? "worker" : "", text(path.alternative || path.alt, "") ? "alternative" : ""].filter(Boolean),
          raw: path,
        });
        nodes.push({
          id: terminalId,
          type: "terminal",
          title: status.toLowerCase().includes("stop") ? "stopped" : "path outcome",
          body: text(path.output || path.outcome_summary || path.alternative || path.alt || "Latest retained outcome.", ""),
          status,
          stateTag,
          x: 1110,
          y,
          pathId,
          targetSessionId: workerSessionIds[0] || "",
          workerSessionIds,
          timestamps,
          sources,
          chips: [child?.status || ""].filter(Boolean),
          raw: path,
        });
        edges.push({ from: rootId, to: hypId, label: "spawns" });
        edges.push({ from: hypId, to: expId, label: "tests" });
        edges.push({ from: expId, to: steerId, label: "guides" });
        edges.push({ from: steerId, to: terminalId, label: "retains" });
      });

      return { nodes, edges };
    }

    function normalize(source) {
      return normalizeExplicit(source) || normalizeMissions(source) || normalizeFallback(source);
    }

    function visibleNodes() {
      return state.graph.nodes.slice(0, state.replayIndex + 1);
    }

    function selectedNode() {
      return state.graph.nodes.find((node) => node.id === state.selectedId) || null;
    }

    function edgePath(a, b) {
      const ax = a.x + 220;
      const ay = a.y + 47;
      const bx = b.x;
      const by = b.y + 47;
      const mid = Math.max(36, Math.abs(bx - ax) / 2);
      return `M ${ax} ${ay} C ${ax + mid} ${ay}, ${bx - mid} ${by}, ${bx} ${by}`;
    }

    function nodeMatchesQuery(node) {
      const q = state.query.trim().toLowerCase();
      if (!q) return true;
      const haystack = [
        node.type,
        node.title,
        node.body,
        node.status,
        node.stateTag,
        node.pathId,
        node.targetSessionId,
        ...(node.workerSessionIds || []),
        ...(node.chips || []),
        ...(node.sources || []).map((source) => `${source.type} ${source.label} ${source.artifact || ""} ${source.commit || ""}`),
      ].join(" ").toLowerCase();
      return haystack.includes(q);
    }

    function render() {
      const nodes = visibleNodes();
      const visible = new Set(nodes.map((node) => node.id));
      el.empty.style.display = nodes.length ? "none" : "grid";
      el.scrubber.max = String(Math.max(state.graph.nodes.length - 1, 0));
      el.scrubber.value = String(state.replayIndex);
      el.stepCount.textContent = `${Math.min(state.replayIndex + 1, state.graph.nodes.length)}/${state.graph.nodes.length}`;

      const maxX = Math.max(1080, ...state.graph.nodes.map((node) => node.x + 300));
      const maxY = Math.max(720, ...state.graph.nodes.map((node) => node.y + 180));
      el.graph.style.width = `${maxX}px`;
      el.graph.style.height = `${maxY}px`;
      el.edges.setAttribute("width", String(maxX));
      el.edges.setAttribute("height", String(maxY));

      el.graph.querySelectorAll(".node").forEach((node) => node.remove());
      const byId = new Map(state.graph.nodes.map((node) => [node.id, node]));
      el.edges.innerHTML = "";
      state.graph.edges.forEach((edge) => {
        const from = byId.get(edge.from);
        const to = byId.get(edge.to);
        if (!from || !to || !visible.has(from.id) || !visible.has(to.id)) return;
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("class", "edge");
        path.setAttribute("d", edgePath(from, to));
        el.edges.appendChild(path);
        const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
        label.setAttribute("class", "edge-label");
        label.setAttribute("x", String((from.x + 220 + to.x) / 2));
        label.setAttribute("y", String((from.y + to.y) / 2 + 39));
        label.textContent = edge.label || "";
        el.edges.appendChild(label);
      });

      nodes.forEach((node) => {
        const div = document.createElement("div");
        const classNames = [
          "node",
          node.type || "hypothesis",
          node.id === state.selectedId ? "selected" : "",
          node.stateTag ? `state-${node.stateTag}` : "",
          node.stateTag === "selected" ? "selected-path" : "",
          state.compareIds.has(node.pathId) ? "compare" : "",
          nodeMatchesQuery(node) ? "" : "search-dim",
        ].filter(Boolean);
        div.className = classNames.join(" ");
        div.style.left = `${node.x}px`;
        div.style.top = `${node.y}px`;
        div.dataset.id = node.id;
        div.innerHTML = `
          <div class="meta">
            <span>${typeLabel[node.type] || node.type || "Node"}</span>
            <span class="status ${statusClass(node.status)}">${node.status || "active"}</span>
          </div>
          <div class="node-title" title="${escapeHtml(node.title)}">${escapeHtml(node.title)}</div>
          <div class="node-body">${escapeHtml(node.body || "")}</div>
          <div class="chips">${(node.chips || []).slice(0, 3).map((chip) => `<span class="chip">${escapeHtml(chip)}</span>`).join("")}</div>
        `;
        div.addEventListener("click", () => selectNode(node.id));
        div.addEventListener("contextmenu", (event) => {
          event.preventDefault();
          selectNode(node.id);
          openContextMenu(node, event.clientX, event.clientY);
        });
        el.graph.appendChild(div);
      });

      renderInspector();
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function selectNode(id) {
      if (state.selectedId !== id) state.sourcePreview = null;
      state.selectedId = id;
      render();
      const nodeEl = el.graph.querySelector(`[data-id="${CSS.escape(id)}"]`);
      nodeEl?.scrollIntoView({ block: "center", inline: "center", behavior: "smooth" });
    }

    function renderInspector() {
      const node = selectedNode();
      if (!node) {
        el.details.innerHTML = '<div class="kv"><span>Status</span><span>No node selected</span></div>';
        el.sources.innerHTML = '<div class="kv"><span>Status</span><span>No sources</span></div>';
        el.sourcePreview.hidden = true;
        el.actions.innerHTML = "";
        return;
      }
      const timestampText = (node.timestamps || []).map((item) => `${item.label} ${item.value}`).join(" · ");
      const workerText = (node.workerSessionIds || []).join(", ");
      el.details.innerHTML = [
        ["Type", typeLabel[node.type] || node.type],
        ["Title", node.title],
        ["Status", node.status || "active"],
        ["State", node.stateTag || "—"],
        ["Path", node.pathId || "run"],
        ["Target", node.targetSessionId || "orchestrator"],
        ["Workers", workerText || "—"],
        ["Times", timestampText || "—"],
      ].map(([key, value]) => `<div class="kv"><span>${escapeHtml(key)}</span><span>${escapeHtml(value)}</span></div>`).join("");

      renderSources(node);

      el.actions.innerHTML = operationsFor(node).map((op) => {
        const danger = op.operation === "stop_path" ? " danger" : op.primary ? " primary" : "";
        return `<button class="button${danger}" data-op="${op.operation}">${escapeHtml(op.label)}</button>`;
      }).join("");
      el.actions.querySelectorAll("button[data-op]").forEach((button) => {
        button.addEventListener("click", () => sendSteer(button.dataset.op, node));
      });
    }

    function sourceTypeLabel(source) {
      if (source.artifact) return "artifact";
      if (source.commit) return "commit";
      if (source.sessionId) return "worker session";
      if (source.href) return "link";
      return source.type || "source";
    }

    function renderSources(node) {
      const sources = node.sources || [];
      if (!sources.length) {
        el.sources.innerHTML = '<div class="kv"><span>Status</span><span>No sources attached</span></div>';
        el.sourcePreview.hidden = true;
        return;
      }
      el.sources.innerHTML = sources.map((source, index) => {
        const detail = source.artifact || source.commit || source.sessionId || source.href || source.detail || "";
        return `
          <button class="source-button" data-source-index="${index}">
            ${escapeHtml(source.label || sourceTypeLabel(source))}
            <span>${escapeHtml(sourceTypeLabel(source))}${detail ? ` · ${escapeHtml(detail)}` : ""}</span>
          </button>
        `;
      }).join("");
      el.sources.querySelectorAll("button[data-source-index]").forEach((button) => {
        button.addEventListener("click", () => showSource(sources[Number(button.dataset.sourceIndex) || 0]));
      });
      if (state.sourcePreview && state.sourcePreview.nodeId === node.id) {
        el.sourcePreview.hidden = false;
        el.sourcePreview.textContent = state.sourcePreview.text;
      } else {
        el.sourcePreview.hidden = true;
      }
    }

    async function showSource(source) {
      const node = selectedNode();
      if (!source || !node) return;
      if (source.href) {
        window.open(source.href, "_blank", "noopener");
        return;
      }
      let preview = "";
      if (source.artifact) {
        try {
          const content = await os.session.readArtifact(source.artifact);
          preview = typeof content === "string" ? content : JSON.stringify(content, null, 2);
        } catch (error) {
          preview = `Could not read ${source.artifact}: ${error?.message || error}`;
        }
      } else if (source.commit) {
        preview = `Commit ${source.commit}`;
      } else if (source.sessionId) {
        preview = `Worker session ${source.sessionId}`;
      } else {
        preview = source.detail || source.label || "No preview available.";
      }
      const clipped = preview.length > 4000 ? `${preview.slice(0, 4000)}\n\n... clipped ...` : preview;
      state.sourcePreview = { nodeId: node.id, text: clipped };
      renderInspector();
    }

    function operationsFor(node) {
      if (!node) return [];
      if (node.type === "experiment") {
        return [
          { operation: "adjust_params", label: "Adjust this path", primary: true },
          { operation: "request_critic", label: "Request critic review" },
        ];
      }
      if (node.type === "escalation") {
        return [
          { operation: "dismiss_escalation", label: "Dismiss escalation", primary: true },
          { operation: "pivot", label: "Pivot from here" },
        ];
      }
      if (node.type === "terminal") {
        return [
          { operation: "spawn_sibling", label: "Spawn sibling path" },
          { operation: "merge_path", label: "Merge into selected path" },
        ];
      }
      if (node.type === "root") {
        return [
          { operation: "spawn_sibling", label: "Ask hypothesizer for sibling", primary: true },
          { operation: "request_critic", label: "Request run critic" },
        ];
      }
      return [
        { operation: "continue", label: "Continue with note", primary: true },
        { operation: "pivot", label: "Pivot using this node" },
        { operation: "stop_path", label: "Stop this path" },
      ];
    }

    async function sendSteer(operation, node) {
      if (!node) return;
      const note = el.note.value.trim();
      try {
        const result = await os.run.steer({
          operation,
          targetSessionId: node.targetSessionId || state.session?.sessionId,
          pathId: node.pathId || "",
          nodeId: node.id,
          note,
          params: { nodeType: node.type, nodeTitle: node.title },
        });
        el.runSub.textContent = `${operation} sent to ${result.targetSessionId || "run"}`;
      } catch (error) {
        el.runSub.textContent = error?.message || "Failed to send steer";
      }
    }

    function openContextMenu(node, x, y) {
      document.querySelector(".context")?.remove();
      const menu = document.createElement("div");
      menu.className = "context";
      menu.style.left = `${Math.min(x, window.innerWidth - 230)}px`;
      menu.style.top = `${Math.min(y, window.innerHeight - 220)}px`;
      menu.innerHTML = operationsFor(node).map((op) => `<button data-op="${op.operation}">${escapeHtml(op.label)}</button>`).join("");
      menu.querySelectorAll("button").forEach((button) => {
        button.addEventListener("click", () => {
          sendSteer(button.dataset.op, node);
          menu.remove();
        });
      });
      document.body.appendChild(menu);
      setTimeout(() => {
        document.addEventListener("click", () => menu.remove(), { once: true });
      }, 0);
    }

    function centerGraph() {
      const visible = visibleNodes();
      if (!visible.length) return;
      const minX = Math.min(...visible.map((node) => node.x));
      const minY = Math.min(...visible.map((node) => node.y));
      const maxX = Math.max(...visible.map((node) => node.x + 220));
      const maxY = Math.max(...visible.map((node) => node.y + 120));
      const targetLeft = (minX + maxX - el.canvas.clientWidth) / 2;
      const targetTop = (minY + maxY - el.canvas.clientHeight) / 2;
      el.canvas.scrollTo({
        left: Math.max(0, targetLeft),
        top: Math.max(0, targetTop),
        behavior: "smooth",
      });
    }

    function startPan(event) {
      if (event.button !== 0) return;
      if (event.target.closest(".node, button, input, textarea, .context")) return;
      state.drag = {
        x: event.clientX,
        y: event.clientY,
        left: el.canvas.scrollLeft,
        top: el.canvas.scrollTop,
      };
      el.canvas.classList.add("dragging");
      event.preventDefault();
    }

    function movePan(event) {
      if (!state.drag) return;
      el.canvas.scrollLeft = state.drag.left - (event.clientX - state.drag.x);
      el.canvas.scrollTop = state.drag.top - (event.clientY - state.drag.y);
    }

    function endPan() {
      if (!state.drag) return;
      state.drag = null;
      el.canvas.classList.remove("dragging");
    }

    async function load() {
      try {
        state.session = await os.session.info();
        el.runTitle.textContent = state.session?.plugin?.displayName || "Evolution";
        el.runSub.textContent = state.session?.sessionId ? `Session ${state.session.sessionId}` : "No active session";
      } catch {
        el.runSub.textContent = "Bridge unavailable";
      }

      try {
        state.children = await os.session.children();
      } catch {
        state.children = { children: [] };
      }

      try {
        state.evolution = await os.session.readArtifact("evolution.json");
      } catch {
        state.evolution = null;
      }

      if (!state.evolution) {
        state.graph = { nodes: [], edges: [] };
        state.replayIndex = 0;
        render();
        return;
      }

      state.graph = normalize(state.evolution);
      state.replayIndex = Math.max(0, state.graph.nodes.length - 1);
      if (!state.selectedId && state.graph.nodes[0]) state.selectedId = state.graph.nodes[0].id;
      render();
      centerGraph();
    }

    function handleCommand(payload) {
      const command = payload?.command;
      const args = payload?.args || [];
      if (command === "refresh") {
        load();
        return;
      }
      if (command === "replay") {
        const arg = args[0];
        if (arg === "start") state.replayIndex = 0;
        else if (arg === "end") state.replayIndex = Math.max(0, state.graph.nodes.length - 1);
        else state.replayIndex = Math.max(0, Math.min(Number(arg) || 0, state.graph.nodes.length - 1));
        render();
        return;
      }
      if (command === "compare") {
        state.compareIds = new Set(args.slice(0, 2).map(slug));
        render();
        return;
      }
      if (command === "focus" || command === "select-node") {
        const id = args[0];
        const node = state.graph.nodes.find((item) => item.id === id || item.pathId === slug(id) || item.title === id);
        if (node) selectNode(node.id);
      }
    }

    el.scrubber.addEventListener("input", () => {
      state.replayIndex = Number(el.scrubber.value) || 0;
      render();
    });

    el.filter.addEventListener("input", () => {
      state.query = el.filter.value || "";
      render();
    });

    el.playBtn.addEventListener("click", () => {
      if (state.playTimer) {
        clearInterval(state.playTimer);
        state.playTimer = null;
        el.playBtn.textContent = ">";
        return;
      }
      el.playBtn.textContent = "||";
      state.playTimer = setInterval(() => {
        if (state.replayIndex >= state.graph.nodes.length - 1) {
          clearInterval(state.playTimer);
          state.playTimer = null;
          el.playBtn.textContent = ">";
          return;
        }
        state.replayIndex += 1;
        render();
      }, 550);
    });

    el.refreshBtn.addEventListener("click", load);
    el.fitBtn.addEventListener("click", centerGraph);
    el.canvas.addEventListener("mousedown", startPan);
    window.addEventListener("mousemove", movePan);
    window.addEventListener("mouseup", endPan);
    window.addEventListener("mouseleave", endPan);
    os.events.on("iframe-command", handleCommand);
    function applyTheme(payload) {
      const mode = payload && payload.mode;
      document.documentElement.classList.toggle("dark", mode === "dark");
      const font = payload && payload.font;
      if (font && font.body) document.body.style.fontFamily = font.body;
      if (font && font.mono) document.documentElement.style.setProperty("--host-font-mono", font.mono);
    }
    os.theme.get().then(applyTheme).catch(() => applyTheme({ mode: "light" }));
    os.theme.subscribe(applyTheme);
    load();
  </script>
</body>
</html>
