services:
  sandbox:
    image: leanprovercommunity/lean4:latest
    command: ["sleep", "infinity"]
    init: true
    user: "${SPOT_HOST_UID}:${SPOT_HOST_GID}"
    working_dir: ${SPOT_HOST_MOUNT}
    volumes:
      - type: bind
        source: ${SPOT_HOST_MOUNT}
        target: ${SPOT_HOST_MOUNT}
        read_only: false

x-spot:
  id: math
  label: "Math (Lean 4)"
  description: "Lean 4 toolchain — lean, lake, elan — for theorem proving and Mathlib work."
  size_hint: "~400 MB"
  schema_version: 1
